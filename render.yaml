services:
  # Next.js web app
  - type: web
    name: trendforge-web
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: REDIS_URL
        sync: false
      - key: WORKER_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20"

  # FastAPI worker API (HTTP endpoints for triggering jobs manually)
  - type: web
    name: trendforge-worker-api
    runtime: docker
    plan: free
    dockerfilePath: ./workers/Dockerfile
    dockerContext: ./workers
    dockerCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5